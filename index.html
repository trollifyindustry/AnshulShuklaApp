<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Login ABG Test</title>

<link rel="icon" href="../../favicon.ico" type="image/x-icon">

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css?family=Roboto:400,700" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<!-- Bootstrap -->
<link href="https://trollifyindustry.github.io/premjanghela/plugins/bootstrap/css/bootstrap.css" rel="stylesheet">

<!-- Waves -->
<link href="https://trollifyindustry.github.io/premjanghela/plugins/node-waves/waves.css" rel="stylesheet">

<!-- Animation -->
<link href="https://trollifyindustry.github.io/premjanghela/plugins/animate-css/animate.css" rel="stylesheet">

<!-- Custom CSS -->
<link href="https://trollifyindustry.github.io/premjanghela/css/style.css" rel="stylesheet">

</head>

<body class="login-page">

<br><br>

<div class="login-box">
    
    <div class="logo">
        <a href="javascript:void(0);">Login<b>ABG</b></a>
        <small>Trollify Infotech - Material Design</small>
    </div>

    <div class="card">
        <div class="body">

<form id="login-form" onsubmit="event.preventDefault(); login();">

<!-- USERNAME -->
<label>Name</label>
<div class="input-group">
    <span class="input-group-addon">
        <i class="material-icons">person</i>
    </span>
    <div class="form-line">
        <input type="text" id="username" class="form-control" placeholder="Enter username" required autofocus>
    </div>
</div>

<!-- PASSWORD -->
<label>Password</label>
<div class="input-group">
    <span class="input-group-addon">
        <i class="material-icons">lock</i>
    </span>
    <div class="form-line">
        <input type="password" id="password" class="form-control" placeholder="Enter password" required>
    </div>
</div>

<div class="row">

<div class="col-xs-8 p-t-5">
    <input type="checkbox" id="rememberme" class="filled-in chk-col-pink">
    <label for="rememberme">Remember Me</label>
</div>

<div class="col-xs-4">
    <button class="btn btn-block bg-pink waves-effect" type="submit">Login</button>
</div>

</div>

<p id="error-message" style="color: red; margin-top:10px;"></p>

<div class="row m-t-15 m-b--20">
    <div class="col-xs-6">
        <a href="register.html">Register Now!</a>
    </div>
    <div class="col-xs-6 align-right">
        <a href="#">Forgot Password?</a>
    </div>
</div>

</form>

        </div>
    </div>
</div>

<!-- JS -->
<script>

// AUTO LOGIN CHECK
const loginData = localStorage.getItem("loginSession");

if (loginData) {
    const session = JSON.parse(loginData);
    const now = new Date().getTime();
    const expiryTime = 15 * 24 * 60 * 60 * 1000;

    if (now - session.loginTime < expiryTime) {
        window.location.href = "dashboard.html";
    } else {
        localStorage.removeItem("loginSession");
    }
}

// LOGIN FUNCTION
function login() {
    const user = document.getElementById("username").value.trim();
    const pass = document.getElementById("password").value.trim();

    if (user === "abg" && pass === "1234") {

        const session = {
            isLoggedIn: true,
            loginTime: new Date().getTime()
        };

        localStorage.setItem("loginSession", JSON.stringify(session));

        window.location.href = "dashboard.html";

    } else {
        document.getElementById("error-message").innerText = "❌ Invalid Username or Password";
    }
}

</script>

</body>
</html>
