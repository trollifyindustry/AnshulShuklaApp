<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login ABG Test</title>

<style>
body {
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
  height: 100vh;
  background: #f5f5f5; /* off-white background */
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Container */
.login-box {
  background: #fff;
  padding: 30px;
  border-radius: 15px;
  width: 300px;
  text-align: center;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
  border-top: 5px solid #ff1a1a;
}

/* Title */
.login-box h2 {
  color: #ff1a1a;
  margin-bottom: 20px;
  font-size: 24px;
}

/* Inputs */
.login-box input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border: 1px solid #ddd;
  outline: none;
  border-radius: 8px;
  font-size: 14px;
  transition: 0.3s;
}

.login-box input:focus {
  border-color: #ff1a1a;
  box-shadow: 0 0 5px rgba(255,0,0,0.2);
}

/* Button */
.login-box button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  border: none;
  border-radius: 8px;
  background: #ff1a1a;
  color: #fff;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

.login-box button:hover {
  background: #cc0000;
}

/* Footer */
.footer {
  margin-top: 15px;
  color: #777;
  font-size: 12px;
}
</style>
</head>

<body>

<div class="login-box">
  <h2>Login ABG</h2>

  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <div class="footer">Secure Login Panel</div>
</div>

<script>
const loginData = localStorage.getItem("loginSession");

if (loginData) {
  const session = JSON.parse(loginData);
  const now = new Date().getTime();
  const expiryTime = 15 * 24 * 60 * 60 * 1000;

  if (now - session.loginTime < expiryTime) {
    window.location.href = "dashboard.html";
  } else {
    localStorage.removeItem("loginSession");
  }
}

function login() {
  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  if (user === "abg" && pass === "1234") {
    const session = {
      isLoggedIn: true,
      loginTime: new Date().getTime()
    };

    localStorage.setItem("loginSession", JSON.stringify(session));
    window.location.href = "dashboard.html";
  } else {
    alert("Invalid Username or Password");
  }
}
</script>

</body>
</html>
